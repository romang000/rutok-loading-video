version: '3.9'

services:
  postgres:
    container_name: postgres-rutok
    image: postgres:latest
    environment:
      POSTGRES_DB: "testDb"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.9-management
    ports:
      - "5672:5672"  # AMQP порт
      - "15672:15672"  # Web UI порт
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    container_name: rutok-app
    image: rtbfff/rutok:latest
    platform: linux/amd64
    ports:
      - "5001:80"   
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DownloadVideoDbContext=User ID=postgres;Password=123;Host=postgres;Port=5432;Database=testDb;
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
      - RABBITMQ_HOST=rabbitmq
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data: